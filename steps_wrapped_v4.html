    <p style="margin-bottom:.5rem"><strong>Drop .xlsx here</strong></p>
    <p>or click to browse</p>
    <input type="file" id="fi" class="file-inp" accept=".xlsx,.xls,.csv"/>
  </div>
  <div class="err" id="errMsg"></div>
  <span class="demo-link" onclick="loadDemo()">or try with demo data →</span>
</div>

<div class="select-screen" id="selectScreen">
  <div class="sel-header">
    <button class="back" onclick="goTo('upload')">←</button>
    <div>
      <div class="sel-title">WHOSE WRAPPED?</div>
      <div class="sel-sub" id="selSub">pick a person</div>
    </div>
  </div>
  <div class="user-grid" id="userGrid"></div>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-top">
    <button class="vt-back" onclick="goTo('select')">←</button>
    <span class="vt-user" id="vtUser"></span>
    <span class="vt-sep">·</span>
    <span class="vt-month" id="vtMonth"></span>
  </div>
  <div class="slide-frame" id="slideFrame"></div>
  <div class="nav-bar">
    <div class="progress-dots" id="progressDots"></div>
    <div class="nb-btns">
      <button class="nb" id="prevBtn" onclick="nav(-1)">←</button>
      <button class="nb primary" id="nextBtn" onclick="nav(1)">next →</button>
    </div>
  </div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const AVG_GLOBAL=4000,STEP_M=0.762;
let DATA=null,curSlide=0,totalSlides=0;
const PALETTES=[
  {bg:'rgba(212,255,0,.12)',color:'#d4ff00'},
  {bg:'rgba(255,45,120,.12)',color:'#ff2d78'},
  {bg:'rgba(0,229,255,.12)',color:'#00e5ff'},
  {bg:'rgba(255,184,0,.12)',color:'#ffb800'},
  {bg:'rgba(124,58,237,.15)',color:'#a78bfa'},
  {bg:'rgba(100,255,180,.1)',color:'#64ffb4'},
];

function goTo(s){
  document.getElementById('uploadScreen').style.display=s==='upload'?'flex':'none';
  document.getElementById('selectScreen').style.display=s==='select'?'block':'none';
  document.getElementById('viewer').classList.toggle('on',s==='viewer');
}
goTo('upload');

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0])});
document.getElementById('fi').addEventListener('change',e=>handleFile(e.target.files[0]));
function showErr(m){const el=document.getElementById('errMsg');el.textContent=m;el.style.display='block'}

function handleFile(f){
  if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){showErr('Please upload .xlsx, .xls, or .csv');return}
  const r=new FileReader();r.onload=e=>parseWB(e.target.result);r.readAsArrayBuffer(f);
}

function parseWB(buf){
  try{
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:0});
    let hRow=-1,dStart=-1;
    for(let i=0;i<Math.min(raw.length,10);i++){
      const r=raw[i];
      if(r.some(c=>typeof c==='string'&&/name/i.test(c))&&r.some(c=>typeof c==='string'&&/day/i.test(c))){hRow=i;dStart=i+1;break}
    }
    if(hRow===-1){showErr('Cannot find Name + Day columns.');return}
    const hdrs=raw[hRow];
    const nameCol=hdrs.findIndex(h=>typeof h==='string'&&/name/i.test(h));
    const dayCols=[];
    hdrs.forEach((h,i)=>{if(typeof h==='string'&&/day\s*\d+/i.test(h))dayCols.push(i)});
    if(nameCol===-1||dayCols.length===0){showErr('Missing Name or Day columns.');return}
    const users=[];
    for(let r=dStart;r<raw.length;r++){
      const row=raw[r];const nm=row[nameCol];
      if(!nm||typeof nm!=='string'||nm.trim()===''||/instruction/i.test(nm))continue;
      users.push({name:nm.trim(),steps:dayCols.map(c=>Math.max(0,parseInt(row[c])||0))});
    }
    if(users.length===0){showErr('No user data found.');return}
    let month='';
    if(ws['!merges']){const c=ws[XLSX.utils.encode_cell({r:0,c:0})];if(c&&c.v){const m=String(c.v).match(/—\s*(.+)/);month=m?m[1]:''}}
    DATA={users,month:month||'This month',days:dayCols.length};
    buildSelect();goTo('select');
  }catch(e){showErr('Parse error: '+e.message)}
}

function loadDemo(){
  const names=['Alex Chen','Jordan Kim','Sam Rivera','Maya Patel','Chris Nguyen'];
  const seed=[
    [9200,11400,0,8700,13200,7800,0,10100,12600,6400,9800,11200,0,8300,14100,7200,9600,10800,0,8900,11700,6800,10200,12400,0,9100,11800,7600,10500,9300],
    [4800,6200,3900,5400,7100,0,4200,5800,6900,4100,5600,7300,3800,4900,6500,0,5200,6800,4400,5700,7200,3700,5100,6600,4000,5900,7000,4300,5500,6300],
    [11200,13800,10600,12900,15400,11800,0,13200,14700,10900,12400,14100,11600,13500,15900,12200,0,14300,11400,13000,15200,11900,13700,14500,10800,12600,14900,11500,13300,15100],
    [6300,8100,5700,7400,9200,6800,5200,7900,8700,6100,7600,9400,5900,7200,8900,6500,7800,9100,5600,7300,8600,6200,7700,9300,5800,7100,8800,6400,7900,8200],
    [2800,4100,3200,2600,4700,3500,0,3800,4400,2900,3600,4200,2700,3900,4600,3300,2500,4000,3100,4500,3700,2800,4300,3900,2600,4100,3400,3000,4600,3200]
  ];
  DATA={users:names.map((n,i)=>({name:n,steps:seed[i]})),month:'April 2025',days:30};
  buildSelect();goTo('select');
}

function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function fmt(n){return Math.round(n).toLocaleString()}
function uTotal(u){return u.steps.reduce((a,b)=>a+b,0)}
function longestStreak(s){let m=0,c=0;s.forEach(v=>{if(v>0){c++;m=Math.max(m,c)}else c=0});return m}

// Fun distance comparisons
function distanceComparisons(km){
  const comps=[
    {dist:5.6,  label:'Times Square → Brooklyn Bridge',emoji:'🗽'},
    {dist:11,   label:'Hollywood Sign → Santa Monica Pier',emoji:'🎬'},
    {dist:17,   label:'Eiffel Tower → Palace of Versailles',emoji:'🗼'},
    {dist:42.2, label:'a full marathon',emoji:'🏅'},
    {dist:88,   label:'NYC → Philadelphia',emoji:'🚆'},
    {dist:180,  label:'LA → San Diego',emoji:'🌊'},
    {dist:350,  label:'Chicago → Detroit',emoji:'🏙️'},
    {dist:560,  label:'London → Paris (and back)',emoji:'✈️'},
    {dist:770,  label:'Miami → Atlanta',emoji:'🌴'},
  ];
  const best=comps.filter(c=>km>=c.dist*0.5).pop()||comps[0];
  const times=(km/best.dist).toFixed(1);
  return `${best.emoji} that's like walking <strong>${times}× ${best.label}</strong>`;
}

function buildSelect(){
  document.getElementById('selSub').textContent=DATA.month+' · '+DATA.users.length+' people';
  const g=document.getElementById('userGrid');g.innerHTML='';
  DATA.users.forEach((u,i)=>{
    const p=PALETTES[i%PALETTES.length];
    const d=document.createElement('div');d.className='u-card';
    d.innerHTML=`<div class="u-avatar" style="background:${p.bg};color:${p.color}">${ini(u.name)}</div><div class="u-name">${u.name}</div><div class="u-steps">${fmt(uTotal(u))} steps</div>`;
    d.onclick=()=>buildViewer(i);g.appendChild(d);
  });
}

function buildViewer(idx){
  const u=DATA.users[idx];
  const steps=u.steps,days=DATA.days;
  const total=uTotal(u);
  const active=steps.filter(s=>s>0);
  const activeDays=active.length;
  const avg=activeDays>0?Math.round(total/activeDays):0;
  const avgAll=Math.round(total/days);
  const max=Math.max(...steps);
  const maxDay=steps.indexOf(max)+1;
  const restDays=days-activeDays;
  const streak=longestStreak(steps);
  const totalCal=Math.round(total*0.04);
  const avgCalDay=activeDays>0?Math.round(totalCal/activeDays):0;
  const km=parseFloat((total*STEP_M/1000).toFixed(1));
  const miles=(km*0.621371).toFixed(1);
  const marathons=(km/42.195).toFixed(1);
  const avgKm=parseFloat((avg*STEP_M/1000).toFixed(2));
  const avgMiles=(avgKm*0.621371).toFixed(2);

  const allTotals=[...DATA.users].map(u=>({name:u.name,total:uTotal(u)})).sort((a,b)=>b.total-a.total);
  const grandTotal=allTotals.reduce((a,b)=>a+b.total,0);
  const rank=allTotals.findIndex(x=>x.name===u.name)+1;
  const myPct=grandTotal>0?((total/grandTotal)*100).toFixed(1):0;
  const top5sorted=allTotals.slice(0,5);
  const top5Days=[...steps.map((s,i)=>({day:i+1,s}))].sort((a,b)=>b.s-a.s).slice(0,5);
  const vsAvgTotal=total-(AVG_GLOBAL*days);

  let persona='',personaDesc='';
  if(avg>=10000){persona='THE ELITE WALKER';personaDesc="You're in the top tier. 10,000+ steps daily is a lifestyle, not a goal — and you've made it your default. The streets know your name."}
  else if(avg>=7500){persona='THE CONSISTENT MOVER';personaDesc="You show up every day. Not flashy, just dependable — your body thanks you for the steady rhythm you've built this month."}
  else if(avg>=5000){persona='THE CASUAL CRUSHER';personaDesc="Above average, every day. You don't obsess, but you don't slack either. There's real momentum building here."}
  else{persona='THE SLOW BURNER';personaDesc="Every step is earned. You're building a foundation — and the best wrapped stories start from right here."}

  document.getElementById('vtUser').textContent=u.name.toUpperCase();
  document.getElementById('vtMonth').textContent=DATA.month;

  const distComp=distanceComparisons(km);
  const avgDistComp=distanceComparisons(avgKm*30);
  const vsAvgFmt=(vsAvgTotal>=0?'+':'')+fmt(vsAvgTotal);

  const slides=[
    // S1: Total
    `<div class="s1" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s1-mesh"></div>
      <div class="s1-eyebrow">total steps · ${DATA.month}</div>
      <div class="s1-name">${u.name.split(' ')[0]}'s month</div>
      <div style="margin-top:1.5rem">
        <div class="s1-label">YOU WALKED</div>
        <div class="s1-num">${fmt(total)}</div>
        <div class="s1-unit">STEPS</div>
      </div>
      <div class="s1-bar"><div class="s1-bar-fill" style="--w:${Math.min(100,Math.round((total/(AVG_GLOBAL*days*2))*100))}%"></div></div>
      <div class="s1-foot">across <strong>${activeDays} active days</strong> · <strong>${restDays} rest days</strong> · ${miles} miles total</div>
    </div>`,

    // S2: Daily Average — with creative comparisons
    `<div class="s2" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s2-mesh"></div>
      <div class="s2-eyebrow">daily average</div>
      <div class="s2-label">on active days, you averaged</div>
      <div class="s2-num">${fmt(avg)}</div>
      <div class="s2-unit">STEPS / DAY</div>
      <div class="s2-divider"></div>
      <div class="s2-compare-grid">
        <div class="s2-stat">
          <div class="s2-stat-val">${avg>=AVG_GLOBAL?(((avg/AVG_GLOBAL-1)*100).toFixed(0)+'% above'):((((AVG_GLOBAL-avg)/AVG_GLOBAL)*100).toFixed(0)+'% below')}</div>
          <div class="s2-stat-lbl">global avg (4,000/day)</div>
        </div>
        <div class="s2-stat">
          <div class="s2-stat-val">${fmt(avgAll)}</div>
          <div class="s2-stat-lbl">monthly avg (inc. rest days)</div>
        </div>
        <div class="s2-stat">
          <div class="s2-stat-val">${avgMiles} mi</div>
          <div class="s2-stat-lbl">distance per active day</div>
        </div>
        <div class="s2-stat">
          <div class="s2-stat-val">${vsAvgFmt}</div>
          <div class="s2-stat-lbl">steps vs avg person this month</div>
        </div>
      </div>
      <div class="s2-fun-row">
        <div class="s2-fun-icon">🗺️</div>
        <div class="s2-fun-text">${distComp} this month — <strong>${miles} miles</strong> total.</div>
      </div>
    </div>`,

    // S3: Top 5 Steppers
    `<div class="s3" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s3-mesh"></div>
      <div class="s3-eyebrow">leaderboard</div>
      <div class="s3-title">TOP 5 STEPPERS</div>
      ${top5sorted.map((p,i)=>{
        const isMe=p.name===u.name;
        const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
        const barPct=top5sorted[0].total>0?Math.round((p.total/top5sorted[0].total)*100):0;
        return `<div class="lb-row">
          <div class="lb-rank ${rankCls}">${i+1}</div>
          <div class="lb-bar-wrap">
            <div class="lb-name">${p.name}${isMe?'<span class="me-badge">YOU</span>':''}</div>
            <div class="lb-track"><div class="lb-fill" style="width:${barPct}%;--i:${i}"></div></div>
          </div>
          <div class="lb-steps ${i===0?'top1':''}">${fmt(p.total)}</div>
        </div>`;
      }).join('')}
    </div>`,

    // S4: Best Day
    `<div class="s4" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s4-mesh"></div>
      <div class="s4-eyebrow">peak performance</div>
      <div class="s4-label">your best single day</div>
      <div class="s4-num">${fmt(max)}</div>
      <div class="s4-date">DAY ${maxDay} · ${DATA.month.split(' ')[0]||''} ${maxDay}</div>
      <div class="s4-compare">
        <div class="s4-chip"><div class="s4-chip-val">${(max/AVG_GLOBAL).toFixed(1)}×</div><div class="s4-chip-lbl">global avg</div></div>
        <div class="s4-chip"><div class="s4-chip-val">${max>=avg?'+'+fmt(max-avg):fmt(max-avg)}</div><div class="s4-chip-lbl">vs your avg</div></div>
        <div class="s4-chip"><div class="s4-chip-val">${(max*STEP_M/1000*0.621).toFixed(1)} mi</div><div class="s4-chip-lbl">that day</div></div>
      </div>
    </div>`,

    // S5: Top 5 Days
    `<div class="s5" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s5-mesh"></div>
      <div class="s5-eyebrow">your power days</div>
      <div class="s5-title">TOP 5 DAYS THIS MONTH</div>
      <div class="days-list">
        ${top5Days.map((d,i)=>{
          const pct=top5Days[0].s>0?Math.round((d.s/top5Days[0].s)*100):0;
          return `<div class="day-item">
            <div class="day-num-badge">${d.day}</div>
            <div class="day-item-bar"><div class="day-item-fill" style="width:${pct}%;--i:${i}"></div></div>
            <div class="day-item-steps ${i===0?'best':''}">${fmt(d.s)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`,

    // S6: Calories
    `<div class="s6" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s6-mesh"></div>
      <div class="s6-eyebrow">energy burned</div>
      <div class="s6-label">avg calories burned per active day</div>
      <div class="s6-num">${fmt(avgCalDay)}</div>
      <div class="s6-unit">KCAL / DAY</div>
      <div class="s6-grid">
        <div class="s6-cell"><div class="s6-cell-val">${fmt(totalCal)}</div><div class="s6-cell-lbl">total kcal this month</div></div>
        <div class="s6-cell"><div class="s6-cell-val">${(totalCal/3500).toFixed(1)} lb</div><div class="s6-cell-lbl">equiv. fat burned</div></div>
        <div class="s6-cell"><div class="s6-cell-val">${Math.round(totalCal/250)}</div><div class="s6-cell-lbl">🥑 avocado toasts</div></div>
        <div class="s6-cell"><div class="s6-cell-val">${Math.round(totalCal/95)}</div><div class="s6-cell-lbl">☕ coffees earned</div></div>
      </div>
    </div>`,

    // S7: Streak
    `<div class="s7" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s7-mesh"></div>
      <div class="s7-eyebrow">consistency check</div>
      <div class="s7-label">longest active streak</div>
      <div class="s7-num">${streak}</div>
      <div class="s7-unit">DAYS IN A ROW</div>
      <div class="s7-foot">active <strong>${activeDays} of ${days} days</strong> — ${Math.round((activeDays/days)*100)}% activity rate. ${streak>=14?'two full weeks straight. relentless.':streak>=7?'a full week without stopping.':streak>=3?'solid consistency. keep going.':'keep building that streak.'}</div>
    </div>`,

    // S8: Persona
    `<div class="s8" style="height:100%;display:flex;flex-direction:column;justify-content:center">
      <div class="s8-mesh"></div>
      <div class="s8-eyebrow">your walker persona</div>
      <div class="s8-title">${persona}</div>
      <div class="s8-desc">${personaDesc}</div>
      <div class="s8-stats-row">
        <div class="s8-stat"><div class="s8-stat-val">#${rank}</div><div class="s8-stat-lbl">of ${DATA.users.length} people</div></div>
        <div class="s8-stat"><div class="s8-stat-val">${myPct}%</div><div class="s8-stat-lbl">of team's steps</div></div>
        <div class="s8-stat"><div class="s8-stat-val">${marathons}</div><div class="s8-stat-lbl">marathons walked</div></div>
      </div>
    </div>`,

    // S9: Finale
    `<div class="s9" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div class="s9-mesh"></div>
      <div class="s9-eyebrow" style="position:relative">that's a wrap · ${DATA.month}</div>
      <div class="s9-name">${u.name.toUpperCase()}</div>
      <div class="s9-tagline">${fmt(total)} STEPS</div>
      <div class="s9-chips">
        <div class="s9-chip hi">#${rank} of ${DATA.users.length}</div>
        <div class="s9-chip">${fmt(avg)} avg/day</div>
        <div class="s9-chip">${streak}d streak</div>
        <div class="s9-chip">${miles} mi</div>
        <div class="s9-chip">${fmt(totalCal)} kcal</div>
        <div class="s9-chip">${vsAvgFmt} vs avg</div>
      </div>
      <button class="s9-replay" onclick="goTo('select')">VIEW ANOTHER →</button>
    </div>`,
  ];

  totalSlides=slides.length;curSlide=0;
  document.getElementById('slideFrame').innerHTML=slides.map((s,i)=>`<div class="slide${i===0?' active':''}" id="sl${i}">${s}</div>`).join('');
  document.getElementById('progressDots').innerHTML=slides.map((_,i)=>`<div class="dot${i===0?' now':''}" style="flex:1" onclick="jumpTo(${i})"></div>`).join('');
  updateNav();goTo('viewer');
}

function nav(dir){
  const next=curSlide+dir;
  if(next<0||next>=totalSlides)return;
  document.getElementById('sl'+curSlide).classList.remove('active');
  curSlide=next;
  document.getElementById('sl'+curSlide).classList.add('active');
  updateNav();
}
function jumpTo(i){
  document.getElementById('sl'+curSlide).classList.remove('active');
  curSlide=i;document.getElementById('sl'+curSlide).classList.add('active');updateNav();
}
function updateNav(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.remove('now','done');
    if(i===curSlide)d.classList.add('now');
    else if(i<curSlide)d.classList.add('done');
  });
  document.getElementById('prevBtn').disabled=curSlide===0;
  const nb=document.getElementById('nextBtn');
  if(curSlide===totalSlides-1){nb.textContent='done ✓';nb.onclick=()=>goTo('select')}
  else{nb.textContent='next →';nb.onclick=()=>nav(1)}
}
</script>
